<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلبات الدخان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #0a0a08; color: #f5f5f0; min-height: 100vh; }
        h1, h2, h3 { font-family: 'Cairo', sans-serif; }
        
        .header {
            position: sticky; top: 0;
            background: rgba(10,10,8,0.97);
            border-bottom: 1px solid #33332a;
            padding: 16px 20px;
            z-index: 100;
        }
        
        .logo {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #ffd000, #e6b800);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        
        .btn {
            padding: 12px 22px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-gold { background: #ffd000; color: #000; }
        .btn-gold:hover { box-shadow: 0 4px 15px rgba(255,208,0,0.4); transform: translateY(-2px); }
        
        .btn-outline { background: transparent; color: #ffd000; border: 2px solid #ffd000; }
        .btn-outline:hover { background: #ffd000; color: #000; }
        
        .btn-red { background: transparent; color: #ff6b6b; border: 2px solid #ff6b6b; }
        .btn-red:hover { background: #ff6b6b; color: white; }

        .btn-blue { background: #0088cc; color: white; border: 2px solid #0088cc; }
        .btn-blue:hover { background: #0077b5; }
        
        .search-wrap { position: relative; max-width: 1100px; margin: 30px auto 20px; padding: 0 20px; }
        .search-input {
            width: 100%;
            background: #1c1c16;
            border: 2px solid #33332a;
            border-radius: 12px;
            padding: 16px 20px 16px 50px;
            color: #f5f5f0;
            font-size: 16px;
        }
        .search-input:focus { outline: none; border-color: #ffd000; }
        .search-icon { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: #9a9a85; }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px 100px; }
        
        .category-title {
            background: linear-gradient(90deg, rgba(255,208,0,0.15) 0%, transparent 100%);
            border-right: 4px solid #ffd000;
            padding: 12px 18px;
            margin-bottom: 14px;
            border-radius: 0 8px 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 12px;
            margin-bottom: 35px;
        }
        
        .product-card {
            background: #141410;
            border: 1px solid #33332a;
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .product-card:hover { border-color: #ffd000; transform: translateY(-2px); }
        .product-card.active { border-color: #ffd000; box-shadow: 0 0 0 2px rgba(255,208,0,0.3); }
        
        .qty-btn {
            width: 36px; height: 36px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        .qty-btn.plus { background: #ffd000; color: #000; }
        .qty-btn.minus { background: #ff6b6b; color: white; }
        .qty-btn:hover { transform: scale(1.1); }
        
        .qty-num { min-width: 40px; text-align: center; font-size: 20px; font-weight: 900; color: #ffd000; }
        
        /* Cart */
        .cart-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 400;
            display: none;
        }
        .cart-overlay.show { display: block; }
        
        .cart-panel {
            position: fixed;
            top: 0; left: -450px;
            width: 420px; max-width: 95vw;
            height: 100vh;
            background: #141410;
            border-left: 1px solid #33332a;
            z-index: 500;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .cart-panel.open { left: 0; }
        
        .cart-item {
            background: #1c1c16;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .total-box {
            background: rgba(255,208,0,0.1);
            border: 2px solid #ffd000;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 16px;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 700;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .modal-overlay.show { display: flex; }
        
        .modal-box {
            background: #111;
            border: 2px solid #ffd000;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 95vh;
            overflow-y: auto;
        }
        
        .form-input {
            width: 100%;
            background: #1c1c16;
            border: 2px solid #33332a;
            border-radius: 10px;
            padding: 14px 16px;
            color: #f5f5f0;
            font-size: 15px;
        }
        .form-input:focus { outline: none; border-color: #ffd000; }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 25px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: #ffd000;
            color: #000;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.error { background: #ff6b6b; color: white; }
        .toast.success { background: #25D366; color: white; }
        
        .badge {
            position: absolute;
            top: -5px; left: -5px;
            background: #ffd000;
            color: #000;
            width: 22px; height: 22px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #9a9a85; }

        /* Hidden invoice for screenshot */
        #invoiceForScreenshot {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 480px;
            background: linear-gradient(145deg, #1a1a1a, #0d0d0a);
            border-radius: 16px;
            padding: 28px;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 640px) {
            .product-card { flex-direction: column; gap: 12px; text-align: center; }
            .products-grid { grid-template-columns: 1fr; }
            #invoiceForScreenshot { width: 320px; padding: 20px; }
            .modal-box { max-width: 100%; border-radius: 15px 15px 0 0; position: fixed; bottom: 0; max-height: 85vh; }
            .modal-overlay { align-items: flex-end; padding: 0; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div style="max-width:1100px;margin:auto;display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:14px;">
            <div class="logo">
                <svg width="24" height="24" fill="none" stroke="#000" stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5"/>
                </svg>
            </div>
            <div>
                <h1 style="font-size:22px;font-weight:900;">طلبات الدخان</h1>
                <p style="font-size:13px;color:#9a9a85;">سوبر ماركت عساف</p>
            </div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
            <button class="btn btn-outline" onclick="openAddModal()">+ إضافة</button>
            <button onclick="toggleCart()" style="position:relative;background:none;border:none;cursor:pointer;padding:10px;border-radius:10px;" onmouseover="this.style.background='#1c1c16'" onmouseout="this.style.background='none'">
                <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                <span id="cartBadge" class="badge" style="display:none;">0</span>
            </button>
        </div>
    </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
    <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن نوع الدخان..." oninput="renderProducts()">
</div>

<!-- PRODUCTS -->
<div id="productsContainer" class="container"></div>

<!-- CART OVERLAY -->
<div id="cartOverlay" class="cart-overlay" onclick="toggleCart()"></div>

<!-- CART PANEL -->
<aside id="cartPanel" class="cart-panel">
    <div style="padding:20px;border-bottom:1px solid #33332a;display:flex;justify-content:space-between;align-items:center;">
        <h2 style="font-size:20px;font-weight:900;">🛒 السلة</h2>
        <button onclick="toggleCart()" style="background:none;border:none;color:#9a9a85;cursor:pointer;font-size:22px;">✕</button>
    </div>
    <div id="cartItemsList" style="flex:1;overflow-y:auto;padding:16px;"></div>
    <div style="padding:20px;border-top:1px solid #33332a;">
        <div class="total-box">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;">
                <span style="color:#9a9a85;">الأصناف:</span>
                <span id="totalTypes">0</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-weight:bold;">الإجمالي:</span>
                <span id="totalQty" style="font-size:28px;font-weight:900;color:#ffd000;">0</span>
            </div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button onclick="clearCart()" class="btn btn-red" style="flex:1;min-width:80px;">مسح</button>
            <button onclick="generateInvoiceImage()" class="btn btn-gold" style="flex:1.5;min-width:140px;" id="invoiceBtn">📸 صورة الفاتورة</button>
        </div>
    </div>
</aside>

<!-- ADD MODAL -->
<div id="addModalOverlay" class="modal-overlay">
    <div class="modal-box" style="max-width:440px;background:#141410;">
        <div style="padding:20px;border-bottom:1px solid #33332a;display:flex;justify-content:space-between;align-items:center;">
            <h3 style="font-weight:900;">إضافة منتج جديد</h3>
            <button onclick="closeAddModal()" style="background:none;border:none;color:#9a9a85;cursor:pointer;font-size:22px;">✕</button>
        </div>
        <div style="padding:20px;">
            <label style="display:block;margin-bottom:6px;font-weight:700;font-size:14px;color:#9a9a85;">اسم المنتج *</label>
            <input type="text" id="newProdName" class="form-input" placeholder="مثال: كينت جولد">
            <label style="display:block;margin:16px 0 6px;font-weight:700;font-size:14px;color:#9a9a85;">اختر قائمة</label>
            <select id="newProdCatSelect" class="form-input" style="background:#1c1c16;"></select>
            <label style="display:block;margin:16px 0 6px;font-weight:700;font-size:14px;color:#ffd000;">أو قائمة جديدة</label>
            <input type="text" id="newCatName" class="form-input" placeholder="اسم القائمة الجديدة">
            <div style="margin-top:22px;display:flex;gap:10px;">
                <button onclick="addNewProduct()" class="btn btn-gold" style="flex:1;">✓ إضافة</button>
                <button onclick="closeAddModal()" class="btn btn-red" style="flex:0.6;">إلغاء</button>
            </div>
        </div>
    </div>
</div>

<!-- IMAGE RESULT MODAL -->
<div id="imageResultModal" class="modal-overlay">
    <div class="modal-box" style="background:#111;text-align:center;padding:0;overflow:hidden;">
        <div style="padding:18px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center;">
            <h3 style="font-weight:900;font-size:16px;">✅ صورة الفاتورة جاهزة</h3>
            <button onclick="closeImageModal()" style="background:none;border:none;color:#9a9a85;cursor:pointer;font-size:24px;padding:5px;">✕</button>
        </div>
        <div style="padding:20px;">
            <img id="resultImage" src="" alt="الفاتورة" style="width:100%;border-radius:12px;border:3px solid #ffd000;margin-bottom:15px;">
            
            <p style="color:#9a9a85;font-size:13px;margin-bottom:18px;line-height:1.7;">
                📱 <strong>على الجوال:</strong> اضغط مطولاً على الصورة ← حفظ ← شارك<br>
                💻 <strong>على الكمبيوتر:</strong> كليك يمين ← حفظ الصورة
            </p>
            
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
                <button onclick="downloadImage()" class="btn btn-blue">💾 تحميل الصورة</button>
                <button onclick="openImageInNewTab()" class="btn btn-green" style="background:#25D366;border-color:#25D366;">🔗 فتح في تبويب</button>
            </div>
        </div>
    </div>
</div>

<!-- HIDDEN INVOICE FOR SCREENSHOT -->
<div id="invoiceForScreenshot"></div>

<!-- TOAST -->
<div id="toastEl" class="toast"></div>

<script>
// ============ البيانات ============
var defaultProducts = [
    {cat:"كينت",items:["كينت ازرق","كينت سلفر","كينت ادفانس ازرق","كينت ادفانس سلفر","كينت ميكس"]},
    {cat:"مارلبورو",items:["مارلبورو احمر","مارلبورو ابيض","مارلبورو سلفر","مارلبورو تتشر","مارلبورو ميكس"]},
    {cat:"ونستون",items:["ونستون ابيض قصير","ونستون ابيض طويل","ونستون احمر","ونستون سلفر","ونستون اكس ياند","ونستون كومباكت سلفر","ونستون ون","ابو مهند","ابو يزن"]},
    {cat:"ميكادو",items:["ميكادو ابيض","ميكادو احمر"]},
    {cat:"اخرى",items:["GAmEL"]},
    {cat:"ال ام",items:["ال ام ابيض قصير","ال ام احمر قصير","ال ام سلفر قصير","ال ام لفت ازرق","ال ام لفت احمر"]},
    {cat:"ال دي",items:["ال دي ابيض","ال دي احمر","ال دي سلفر"]},
    {cat:"جولد كوست",items:["جولد كوست ابيض قصير","جولد كوست احمر قصير","جولد كوست ابيض طويل","جولد كوست احمر طويل"]},
    {cat:"اندرسون",items:["اندرسون احمر طويل","اندرسون سلفر طويل","اندرسون سلفر قصير","اندرسون ابيض طويل","اندرسون احمر قصير","اندرسون ابيض قصير"]},
    {cat:"بارلمنت",items:["بارلمنت نايت ازرق","بارلمنت اكو ازرق"]},
    {cat:"إلجنس",items:["إلجنس ازرق","إلجنس اخضر","إلجنس سلفر"]},
    {cat:"دفدوف",items:["دفدوف احمر","دفدوف ازرق"]},
    {cat:"يلاتينوم",items:["يلاتينوم توت","يلاتينوم مانجا","يلاتينوم برتقال"]}
];

var productsData = [];
var cartData = {};
var lastImageUrl = null;

// ============ تحميل البيانات ============
function initApp() {
    productsData = JSON.parse(JSON.stringify(defaultProducts));
    
    try {
        var saved = localStorage.getItem('smoke_products_v8');
        if (saved) {
            var custom = JSON.parse(saved);
            if (custom && custom.length > 0) {
                for (var i = 0; i < custom.length; i++) {
                    var cc = custom[i];
                    var found = false;
                    for (var j = 0; j < productsData.length; j++) {
                        if (productsData[j].cat === cc.cat) {
                            for (var k = 0; k < cc.items.length; k++) {
                                if (productsData[j].items.indexOf(cc.items[k]) === -1) {
                                    productsData[j].items.push(cc.items[k]);
                                }
                            }
                            found = true;
                            break;
                        }
                    }
                    if (!found) productsData.push({cat: cc.cat, items: cc.items.slice()});
                }
            }
        }
    } catch(e) {}
    
    try {
        var c = localStorage.getItem('smoke_cart_v8');
        if (c) cartData = JSON.parse(c);
    } catch(e) {}
    
    renderProducts();
}

function saveData() {
    try { localStorage.setItem('smoke_products_v8', JSON.stringify(productsData)); } catch(e) {}
    try { localStorage.setItem('smoke_cart_v8', JSON.stringify(cartData)); } catch(e) {}
}

// ============ عرض المنتجات ============
function renderProducts() {
    var container = document.getElementById('productsContainer');
    var searchText = document.getElementById('searchInput').value.trim().toLowerCase();
    var html = '';
    var hasResults = false;
    
    for (var ci = 0; ci < productsData.length; ci++) {
        var category = productsData[ci];
        var filteredItems = [];
        for (var ii = 0; ii < category.items.length; ii++) {
            var item = category.items[ii];
            if (searchText === '' || item.toLowerCase().indexOf(searchText) !== -1 || category.cat.toLowerCase().indexOf(searchText) !== -1) {
                filteredItems.push(item);
            }
        }
        if (filteredItems.length === 0) continue;
        hasResults = true;
        
        html += '<div>';
        html += '<div class="category-title">';
        html += '<h3 style="font-size:18px;font-weight:900;">' + category.cat + '</h3>';
        html += '<span style="font-size:12px;color:#9a9a85;">' + filteredItems.length + ' أصناف</span>';
        html += '</div>';
        html += '<div class="products-grid">';
        
        for (var fi = 0; fi < filteredItems.length; fi++) {
            var productName = filteredItems[fi];
            var qty = cartData[productName] || 0;
            var activeClass = qty > 0 ? 'active' : '';
            html += '<div class="product-card ' + activeClass + '">';
            html += '<span style="font-weight:700;font-size:15px;">' + productName + '</span>';
            html += '<div style="display:flex;align-items:center;gap:8px;">';
            html += '<button class="qty-btn minus" onclick="changeQty(\'' + escapeHtml(productName) + '\',-1)">−</button>';
            html += '<span class="qty-num">' + qty + '</span>';
            html += '<button class="qty-btn plus" onclick="changeQty(\'' + escapeHtml(productName) + '\',1)">+</button>';
            html += '</div></div>';
        }
        html += '</div></div>';
    }
    
    if (!hasResults) {
        html = '<div class="empty-state"><p style="font-size:20px;">لا توجد نتائج</p><p style="font-size:14px;margin-top:8px;">جرب بحث آخر</p></div>';
    }
    
    container.innerHTML = html;
    updateCartUI();
}

function changeQty(name, delta) {
    var q = (cartData[name] || 0) + delta;
    if (q <= 0) delete cartData[name];
    else cartData[name] = q;
    saveData();
    renderProducts();
    if (delta > 0) showToast('تم إضافة ' + name);
}

function updateCartUI() {
    var badge = document.getElementById('cartBadge');
    var tT = document.getElementById('totalTypes');
    var tQ = document.getElementById('totalQty');
    var list = document.getElementById('cartItemsList');
    
    var entries = [];
    for (var k in cartData) { if (cartData[k] > 0) entries.push({n:k,q:cartData[k]}); }
    
    var totalQ = 0;
    for (var i = 0; i < entries.length; i++) totalQ += entries[i].q;
    
    badge.style.display = entries.length > 0 ? 'flex' : 'none';
    badge.textContent = totalQ;
    tT.textContent = entries.length + ' صنف';
    tQ.textContent = totalQ;
    
    if (entries.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>السلة فارغة</p></div>';
        return;
    }
    
    var h = '';
    for (var j = 0; j < entries.length; j++) {
        var e = entries[j];
        h += '<div class="cart-item">';
        h += '<div><p style="margin:0;font-weight:700;">' + e.n + '</p><p style="margin:4px 0 0;font-size:13px;color:#9a9a85;">' + e.q + ' كروز</p></div>';
        h += '<div style="display:flex;gap:6px;align-items:center;">';
        h += '<button class="qty-btn minus" style="width:34px;height:34px;font-size:16px;" onclick="changeQty(\'' + escapeHtml(e.n) + '\',-1)">−</button>';
        h += '<span style="min-width:36px;text-align:center;font-weight:900;font-size:18px;">' + e.q + '</span>';
        h += '<button class="qty-btn plus" style="width:34px;height:34px;font-size:16px;" onclick="changeQty(\'' + escapeHtml(e.n) + '\',1)">+</button>';
        h += '</div></div>';
    }
    list.innerHTML = h;
}

function toggleCart() {
    var p = document.getElementById('cartPanel'), o = document.getElementById('cartOverlay');
    if (p.classList.contains('open')) { p.classList.remove('open'); o.classList.remove('show'); }
    else { p.classList.add('open'); o.classList.add('show'); }
}

function clearCart() {
    if (Object.keys(cartData).length === 0) { showToast('السلة فارغة!'); return; }
    if (confirm('مسح جميع العناصر؟')) { cartData = {}; saveData(); renderProducts(); showToast('تم المسح'); }
}

// ============ إضافة منتج ============
function openAddModal() {
    var sel = document.getElementById('newProdCatSelect');
    sel.innerHTML = '<option value="">-- اختر --</option>';
    for (var i = 0; i < productsData.length; i++) {
        var o = document.createElement('option');
        o.value = productsData[i].cat; o.textContent = productsData[i].cat;
        sel.appendChild(o);
    }
    document.getElementById('newProdName').value = '';
    document.getElementById('newCatName').value = '';
    sel.value = '';
    document.getElementById('addModalOverlay').classList.add('show');
    setTimeout(function(){document.getElementById('newProdName').focus();},200);
}
function closeAddModal() { document.getElementById('addModalOverlay').classList.remove('show'); }

function addNewProduct() {
    var name = document.getElementById('newProdName').value.trim();
    var catSel = document.getElementById('newProdCatSelect').value;
    var newCat = document.getElementById('newCatName').value.trim();
    
    if (!name || name.length < 2) { showToast('أدخل اسم المنتج', true); return; }
    
    var target = '';
    if (newCat && newCat.length >= 2) target = newCat;
    else if (catSel) target = catSel;
    else { showToast('اختر قائمة أو أدخل جديدة', true); return; }
    
    var catObj = null;
    for (var i = 0; i < productsData.length; i++) {
        if (productsData[i].cat === target) { catObj = productsData[i]; break; }
    }
    if (!catObj) { catObj = {cat: target, items: []}; productsData.push(catObj); }
    
    for (var j = 0; j < catObj.items.length; j++) {
        if (catObj.items[j] === name) { showToast('موجود مسبقاً!', true); return; }
    }
    
    catObj.items.push(name);
    saveData();
    renderProducts();
    closeAddModal();
    showToast('✓ تم إضافة "' + name + '"');
}

// ============ بناء الفاتورة (بدون نجوم) ============
function buildInvoiceHTML() {
    var entries = [];
    for (var k in cartData) { if (cartData[k] > 0) entries.push({n:k,q:cartData[k]}); }
    if (entries.length === 0) return '';
    
    var now = new Date();
    var dateStr = now.toLocaleDateString('ar-SA', {year:'numeric', month:'long', day:'numeric'});
    var timeStr = now.toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
    var totalQ = 0;
    for (var i = 0; i < entries.length; i++) totalQ += entries[i].q;
    
    var rows = '';
    for (var j = 0; j < entries.length; j++) {
        rows += '<tr><td style="padding:10px 14px;border:1px solid #444;text-align:center;color:#888;width:40px;font-size:14px;">' + (j+1) + '</td>';
        rows += '<td style="padding:10px 14px;border:1px solid #444;font-weight:bold;font-size:15px;">' + entries[j].n + '</td>';
        rows += '<td style="padding:10px 14px;border:1px solid #444;text-align:center;font-size:18px;font-weight:900;color:#ffd000;width:65px;">' + entries[j].q + '</td></tr>';
    }
    
    var html = '';
    // Header - بدون نجوم
    html += '<div style="text-align:center;margin-bottom:16px;padding-bottom:14px;border-bottom:2px dashed #ffd000;">';
    html += '<div style="font-size:28px;font-weight:900;color:#ffd000;">سوبر ماركت عساف</div>';
    html += '<div style="font-size:20px;font-weight:800;color:#fff;margin-top:6px;">فاتورة طلبية دخان</div>';
    html += '</div>';
    
    // Table
    html += '<table style="width:100%;border-collapse:collapse;margin:12px 0;">';
    html += '<thead><tr style="background:#ffd000;"><th style="padding:10px;color:#000;font-weight:900;font-size:13px;border:2px solid #e6b800;text-align:right;">#</th><th style="padding:10px;color:#000;font-weight:900;font-size:13px;border:2px solid #e6b800;text-align:right;">الصنف</th><th style="padding:10px;color:#000;font-weight:900;font-size:13px;border:2px solid #e6b800;text-align:center;">كمية</th></tr></thead>';
    html += '<tbody>' + rows + '</tbody></table>';
    
    // Total
    html += '<div style="background:linear-gradient(135deg,#2a2200,#1a1500);border:2px solid #ffd000;border-radius:10px;padding:14px;display:flex;justify-content:space-between;align-items:center;margin:14px 0;">';
    html += '<span style="font-size:16px;font-weight:700;color:#ccc;">الإجمالي الكلي:</span>';
    html += '<span style="font-size:26px;font-weight:900;color:#ffd000;">' + totalQ + ' كروز</span>';
    html += '</div>';
    
    // Footer
    html += '<div style="text-align:center;margin-top:14px;padding-top:12px;border-top:1px solid #333;">';
    html += '<p style="color:#777;font-size:12px;">التاريخ: ' + dateStr + ' | الوقت: ' + timeStr + '</p>';
    html += '<p style="color:#ffd000;font-size:15px;font-weight:700;margin-top:6px;">شكراً لتعاملكم معنا</p>';
    html += '</div>';
    
    return html;
}

// ============ إنشاء صورة الفاتورة ============
async function generateInvoiceImage() {
    var entries = [];
    for (var k in cartData) { if (cartData[k] > 0) entries.push({n:k,q:cartData[k]}); }
    if (entries.length === 0) { showToast('السلة فارغة!', true); return; }
    
    var btn = document.getElementById('invoiceBtn');
    btn.innerHTML = '<span class="spinner"></span> جاري...';
    btn.disabled = true;
    
    try {
        // Build invoice
        var preview = document.getElementById('invoiceForScreenshot');
        preview.innerHTML = buildInvoiceHTML();
        preview.style.position = 'fixed';
        preview.style.top = '0';
        preview.style.left = '0';
        preview.style.zIndex = '99998';
        
        await new Promise(r => setTimeout(r, 200));
        
        // Capture
        var canvas = await html2canvas(preview, {
            backgroundColor: '#1a1a1a',
            scale: 2,
            useCORS: true,
            logging: false,
            width: preview.scrollWidth,
            height: preview.scrollHeight
        });
        
        // Hide preview
        preview.style.top = '-9999px';
        preview.style.left = '-9999px';
        
        // Convert to image
        var imageUrl = canvas.toDataURL('image/png');
        lastImageUrl = imageUrl;
        
        // Show result modal
        document.getElementById('resultImage').src = imageUrl;
        document.getElementById('imageResultModal').classList.add('show');
        
        resetBtn();
        showToast('تم إنشاء الصورة بنجاح', false, 'success');
        
    } catch(err) {
        console.error(err);
        showToast('حدث خطأ، حاول مجدداً', true);
        resetBtn();
    }
}

function resetBtn() {
    var btn = document.getElementById('invoiceBtn');
    btn.innerHTML = '📸 صورة الفاتورة';
    btn.disabled = false;
}

function closeImageModal() {
    document.getElementById('imageResultModal').classList.remove('show');
}

// ============ تحميل الصورة ============
function downloadImage() {
    if (!lastImageUrl) return;
    
    var link = document.createElement('a');
    link.download = 'فاتورة-عساف-' + Date.now() + '.png';
    link.href = lastImageUrl;
    link.click();
    
    showToast('جاري التحميل...');
}

// ============ فتح في تبويب جديد ============
function openImageInNewTab() {
    if (!lastImageUrl) return;
    
    var win = window.open('', '_blank');
    if (win) {
        win.document.write('<html><head><title>الفاتورة</title><style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#222;}img{max-width:100%;height:auto;}</style></head><body><img src="' + lastImageUrl + '" alt="الفاتورة"/></body></html>');
        win.document.close();
    }
}

// ============ Toast ============
function showToast(msg, isError, type) {
    var t = document.getElementById('toastEl');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : (type ? ' ' + type : ''));
    setTimeout(function() { t.className = 'toast'; }, 3500);
}

function escapeHtml(t) { return t.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// ============ Keyboard ============
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        if (document.getElementById('imageResultModal').classList.contains('show')) closeImageModal();
        else if (document.getElementById('addModalOverlay').classList.contains('show')) closeAddModal();
        else { var p = document.getElementById('cartPanel'); if (p.classList.contains('open')) toggleCart(); }
    }
});

// ============ Start ============
initApp();

</script>
