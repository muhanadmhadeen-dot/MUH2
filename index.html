<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلبات الدخان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #0a0a08; color: #f5f5f0; min-height: 100vh; }
        h1, h2, h3 { font-family: 'Cairo', sans-serif; }
        
        .header {
            position: sticky; top: 0;
            background: rgba(10,10,8,0.97);
            border-bottom: 1px solid #33332a;
            padding: 16px 20px;
            z-index: 100;
        }
        
        .logo {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #ffd000, #e6b800);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        
        .btn {
            padding: 12px 22px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-gold { background: #ffd000; color: #000; }
        .btn-gold:hover { box-shadow: 0 4px 15px rgba(255,208,0,0.4); transform: translateY(-2px); }
        .btn-gold:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-outline { background: transparent; color: #ffd000; border: 2px solid #ffd000; }
        .btn-outline:hover { background: #ffd000; color: #000; }
        
        .btn-red { background: transparent; color: #ff6b6b; border: 2px solid #ff6b6b; }
        .btn-red:hover { background: #ff6b6b; color: white; }

        .btn-blue { background: #0088cc; color: white; border: 2px solid #0088cc; }
        .btn-blue:hover { background: #0077b5; }

        .btn-green { background: #25D366; color: white; border: 2px solid #25D366; }
        .btn-green:hover { background: #128C7E; }
        
        .search-wrap { position: relative; max-width: 1100px; margin: 30px auto 20px; padding: 0 20px; }
        .search-input {
            width: 100%;
            background: #1c1c16;
            border: 2px solid #33332a;
            border-radius: 12px;
            padding: 16px 20px 16px 50px;
            color: #f5f5f0;
            font-size: 16px;
        }
        .search-input:focus { outline: none; border-color: #ffd000; }
        .search-icon { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: #9a9a85; }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px 100px; }
        
        .category-title {
            background: linear-gradient(90deg, rgba(255,208,0,0.15) 0%, transparent 100%);
            border-right: 4px solid #ffd000;
            padding: 12px 18px;
            margin-bottom: 14px;
            border-radius: 0 8px 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 12px;
            margin-bottom: 35px;
        }
        
        .product-card {
            background: #141410;
            border: 1px solid #33332a;
            border-radius: 10px;
            padding: 14px 18px;
            padding-left: 38px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            position: relative;
        }
        .product-card:hover { border-color: #ffd000; transform: translateY(-2px); }
        .product-card.active { border-color: #ffd000; box-shadow: 0 0 0 2px rgba(255,208,0,0.3); }
        .product-card.is-custom { border-right: 3px solid #9333ea; }
        
        .delete-product-btn {
            position: absolute;
            top: 6px; left: 6px;
            width: 26px; height: 26px;
            background: rgba(255,107,107,0.15);
            border: 1px solid rgba(255,107,107,0.3);
            border-radius: 6px;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .delete-product-btn:hover { 
            background: #ff6b6b; 
            color: white; 
            transform: scale(1.1); 
        }
        
        .qty-btn {
            width: 36px; height: 36px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        .qty-btn.plus { background: #ffd000; color: #000; }
        .qty-btn.minus { background: #ff6b6b; color: white; }
        .qty-btn:hover { transform: scale(1.1); }
        
        .qty-num { min-width: 40px; text-align: center; font-size: 20px; font-weight: 900; color: #ffd000; }
        
        /* Cart */
        .cart-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 400;
            display: none;
        }
        .cart-overlay.show { display: block; }
        
        .cart-panel {
            position: fixed;
            top: 0; left: -450px;
            width: 420px; max-width: 95vw;
            height: 100vh;
            background: #141410;
            border-left: 1px solid #33332a;
            z-index: 500;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .cart-panel.open { left: 0; }
        
        .cart-item {
            background: #1c1c16;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .total-box {
            background: rgba(255,208,0,0.1);
            border: 2px solid #ffd000;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 16px;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 700;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .modal-overlay.show { display: flex; }
        
        .modal-box {
            background: #111;
            border: 2px solid #ffd000;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 95vh;
            overflow-y: auto;
        }
        
        .form-input {
            width: 100%;
            background: #1c1c16;
            border: 2px solid #33332a;
            border-radius: 10px;
            padding: 14px 16px;
            color: #f5f5f0;
            font-size: 15px;
        }
        .form-input:focus { outline: none; border-color: #ffd000; }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 25px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: #ffd000;
            color: #000;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.error { background: #ff6b6b; color: white; }
        .toast.success { background: #25D366; color: white; }
        
        .badge {
            position: absolute;
            top: -5px; left: -5px;
            background: #ffd000;
            color: #000;
            width: 22px; height: 22px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #9a9a85; }

        /* Hidden invoice for screenshot - MOBILE OPTIMIZED */
        #invoiceForScreenshot {
            position: fixed;
            top: -9999px;
            left: -9999px;
            /* حجم مناسب للهاتف */
            width: 360px;
            background: linear-gradient(145deg, #1a1a1a, #0d0d0a);
            border-radius: 16px;
            padding: 24px;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }

        @media(min-width: 500px) {
            #invoiceForScreenshot { width: 480px; padding: 28px; }
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 640px) {
            .product-card { flex-direction: column; gap: 12px; text-align: center; }
            .products-grid { grid-template-columns: 1fr; }
            .modal-box { max-width: 100%; border-radius: 15px 15px 0 0; position: fixed; bottom: 0; max-height: 85vh; }
            .modal-overlay { align-items: flex-end; padding: 0; }
            .cart-panel { left: -100%; width: 100%; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div style="max-width:1100px;margin:auto;display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:14px;">
            <div class="logo">
                <svg width="24" height="24" fill="none" stroke="#000" stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5"/>
                </svg>
            </div>
            <div>
                <h1 style="font-size:22px;font-weight:900;">طلبات الدخان</h1>
                <p style="font-size:13px;color:#9a9a85;">سوبر ماركت عساف</p>
            </div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
            <button class="btn btn-outline" onclick="openAddModal()">+ إضافة</button>
            <button onclick="toggleCart()" style="position:relative;background:none;border:none;cursor:pointer;padding:10px;border-radius:10px;" onmouseover="this.style.background='#1c1c16'" onmouseout="this.style.background='none'">
                <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                <span id="cartBadge" class="badge" style="display:none;">0</span>
            </button>
        </div>
    </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
    <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن نوع الدخان..." oninput="renderProducts()">
</div>

<!-- PRODUCTS -->
<div id="productsContainer" class="container"></div>

<!-- CART OVERLAY -->
<div id="cartOverlay" class="cart-overlay" onclick="toggleCart()"></div>

<!-- CART PANEL -->
<aside id="cartPanel" class="cart-panel">
    <div style="padding:20px;border-bottom:1px solid #33332a;display:flex;justify-content:space-between;align-items:center;">
        <h2 style="font-size:20px;font-weight:900;">🛒 السلة</h2>
        <button onclick="toggleCart()" style="background:none;border:none;color:#9a9a85;cursor:pointer;font-size:22px;">✕</button>
    </div>
    <div id="cartItemsList" style="flex:1;overflow-y:auto;padding:16px;"></div>
    <div style="padding:20px;border-top:1px solid #33332a;">
        <div class="total-box">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;">
                <span style="color:#9a9a85;">الأصناف:</span>
                <span id="totalTypes">0</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-weight:bold;">الإجمالي:</span>
                <span id="totalQty" style="font-size:28px;font-weight:900;color:#ffd000;">0</span>
            </div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button onclick="clearCart()" class="btn btn-red" style="flex:1;min-width:80px;">مسح</button>
            <button onclick="shareImageDirect()" class="btn btn-green" style="flex:1.5;min-width:130px;" id="shareBtn">📤 مشاركة</button>
            <button onclick="printOrder()" class="btn btn-blue" style="flex:1;min-width:90px;">🖨️ طباعة</button>
        </div>
    </div>
</aside>

<!-- ADD MODAL -->
<div id="addModalOverlay" class="modal-overlay">
    <div class="modal-box" style="max-width:440px;background:#141410;">
        <div style="padding:20px;border-bottom:1px solid #33332a;display:flex;justify-content:space-between;align-items:center;">
            <h3 style="font-weight:900;">إضافة منتج جديد</h3>
            <button onclick="closeAddModal()" style="background:none;border:none;color:#9a9a85;cursor:pointer;font-size:22px;">✕</button>
        </div>
        <div style="padding:20px;">
            <label style="display:block;margin-bottom:6px;font-weight:700;font-size:14px;color:#9a9a85;">اسم المنتج *</label>
            <input type="text" id="newProdName" class="form-input" placeholder="مثال: كينت جولد">
            <label style="display:block;margin:16px 0 6px;font-weight:700;font-size:14px;color:#9a9a85;">اختر قائمة</label>
            <select id="newProdCatSelect" class="form-input" style="background:#1c1c16;"></select>
            <label style="display:block;margin:16px 0 6px;font-weight:700;font-size:14px;color:#ffd000;">أو قائمة جديدة</label>
            <input type="text" id="newCatName" class="form-input" placeholder="اسم القائمة الجديدة">
            <div style="margin-top:22px;display:flex;gap:10px;">
                <button onclick="addNewProduct()" class="btn btn-gold" style="flex:1;">✓ إضافة</button>
                <button onclick="closeAddModal()" class="btn btn-red" style="flex:0.6;">إلغاء</button>
            </div>
        </div>
    </div>
</div>

<!-- HIDDEN INVOICE FOR SCREENSHOT -->
<div id="invoiceForScreenshot"></div>

<!-- TOAST -->
<div id="toastEl" class="toast"></div>

<script>
// ============ البيانات ============
var DEFAULT_PRODUCTS = [
    {cat:"كينت",items:["كينت ازرق","كينت سلفر","كينت ادفانس ازرق","كينت ادفانس سلفر","كينت ميكس"]},
    {cat:"مارلبورو",items:["مارلبورو احمر","مارلبورو ابيض","مارلبورو سلفر","مارلبورو تتشر","مارلبورو ميكس"]},
    {cat:"ونستون",items:["ونستون ابيض قصير","ونستون ابيض طويل","ونستون احمر","ونستون سلفر","ونستون اكس ياند","ونستون كومباكت سلفر","ونستون ون","ابو مهند","ابو يزن"]},
    {cat:"ميكادو",items:["ميكادو ابيض","ميكادو احمر"]},
    {cat:"اخرى",items:["GAmEL"]},
    {cat:"ال ام",items:["ال ام ابيض قصير","ال ام احمر قصير","ال ام سلفر قصير","ال ام لفت ازرق","ال ام لفت احمر"]},
    {cat:"ال دي",items:["ال دي ابيض","ال دي احمر","ال دي سلفر"]},
    {cat:"جولد كوست",items:["جولد كوست ابيض قصير","جولد كوست احمر قصير","جولد كوست ابيض طويل","جولد كوست احمر طويل"]},
    {cat:"اندرسون",items:["اندرسون احمر طويل","اندرسون سلفر طويل","اندرسون سلفر قصير","اندرسون ابيض طويل","اندرسون احمر قصير","اندرسون ابيض قصير"]},
    {cat:"بارلمنت",items:["بارلمنت نايت ازرق","بارلمنت اكو ازرق"]},
    {cat:"إلجنس",items:["إلجنس ازرق","إلجنس اخضر","إلجنس سلفر"]},
    {cat:"دفدوف",items:["دفدوف احمر","دفدوف ازرق"]},
    {cat:"يلاتينوم",items:["يلاتينوم توت","يلاتينوم مانجا","يلاتينوم برتقال"]}
];

var productsData = [];
var cartData = {};
var customProductsList = [];
var lastImageUrl = null;

var KEY_CUSTOM = 'asaf_custom_vfinal';
var KEY_CART = 'asaf_cart_vfinal';

// ============ أدوات ============
function saveData(k,d){try{localStorage.setItem(k,JSON.stringify(d));return true;}catch(e){return false;}}
function loadData(k,d){try{var s=localStorage.getItem(k);return s?JSON.parse(s):d;}catch(e){return d;}}
function saveAll(){saveData(KEY_CUSTOM,customProductsList);saveData(KEY_CART,cartData);}

// ============ بدء ============
function initApp(){
    customProductsList=loadData(KEY_CUSTOM,[]);
    buildFullList();
    cartData=loadData(KEY_CART,{});
    renderProducts();
}

function buildFullList(){
    productsData=JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
    for(var i=0;i<customProductsList.length;i++){
        var it=customProductsList[i],c=null;
        for(var j=0;j<productsData.length;j++){if(productsData[j].cat===it.category){c=productsData[j];break;}}
        if(!c){c={cat:it.category,items:[]};productsData.push(c);}
        if(c.items.indexOf(it.name)===-1)c.items.push(it.name);
    }
}

// ============ عرض ============
function renderProducts(){
    var c=document.getElementById('productsContainer'),s=document.getElementById('searchInput').value.trim().toLowerCase(),h='',has=false;
    for(var ci=0;ci<productsData.length;ci++){
        var cat=productsData[ci],filt=[];
        for(var ii=0;ii<cat.items.length;ii++){var it=cat.items[ii];if(s==''||it.toLowerCase().indexOf(s)!==-1||cat.cat.toLowerCase().indexOf(s)!==-1)filt.push(it);}
        if(filt.length===0)continue;has=true;
        h+='<div><div class="category-title"><h3 style="font-size:18px;font-weight:900;">'+cat.cat+'</h3><span style="font-size:12px;color:#9a9a85;">'+filt.length+' أصناف</span></div><div class="products-grid">';
        for(var fi=0;fi<filt.length;fi++){
            var pn=filt[fi],q=cartData[pn]||0,ac=q>0?'active':'',isC=isCustom(pn),cc=isC?'is-custom':'',db=isC?'<button class="delete-product-btn" onclick="event.stopPropagation();confirmDel(\''+esc(pn)+'\')" title="حذف">✕</button>':'',ns=isC?'color:#c084fc;':'',bg=isC?' 🆕':'';
            h+='<div class="product-card '+ac+' '+cc+'">'+db+'<span style="font-weight:700;font-size:15px;'+ns+'">'+pn+bg+'</span>';
            h+='<div style="display:flex;align-items:center;gap:8px;"><button class="qty-btn minus" onclick="chg(\''+esc(pn)+'\",-1)">−</button><span class="qty-num">'+q+'</span><button class="qty-btn plus" onclick="chg(\''+esc(pn)+'\',1)">+</button></div></div>';
        }
        h+='</div></div>';
    }
    if(!has)h='<div class="empty-state"><p style="font-size:20px;">لا توجد نتائج</p></div>';
    c.innerHTML=h;updateCartUI();
}

function isCustom(n){for(var i=0;i<customProductsList.length;i++)if(customProductsList[i].name===n)return true;return false;}
function confirmDel(n){if(confirm('حذف "'+n+'"؟')){for(var i=0;i<customProductsList.length;i++){if(customProductsList[i].name===n){customProductsList.splice(i,1);break;}}delete cartData[n];saveAll();buildFullList();renderProducts();showToast('تم الحذف');}}

function chg(n,d){var q=(cartData[n]||0)+d;if(q<=0)delete cartData[n];else cartData[n]=q;saveAll();renderProducts();if(d>0)showToast('تم إضافة '+n);}

function updateCartUI(){
    var b=document.getElementById('cartBadge'),tT=document.getElementById('totalTypes'),tQ=document.getElementById('totalQty'),l=document.getElementById('cartItemsList'),ents=[];
    for(var k in cartData){if(cartData[k]>0)ents.push({n:k,q:cartData[k]});}
    var tq=0;for(var i=0;i<ents.length;i++)tq+=ents[i].q;
    b.style.display=ents.length>0?'flex':'none';b.textContent=tq;tT.textContent=ents.length+' صنف';tQ.textContent=tq;
    if(!ents.length){l.innerHTML='<div class="empty-state"><p>السلة فارغة</p></div>';return;}
    var h='';for(var j=0;j<ents.length;j++){var e=ents[j];h+='<div class="cart-item"><div><p style="margin:0;font-weight:700;">'+e.n+'</p><p style="margin:4px 0 0;font-size:13px;color:#9a9a85;">'+e.q+' كروز</p></div><div style="display:flex;gap:6px;align-items:center;"><button class="qty-btn minus" style="width:34px;height:34px;font-size:16px;" onclick="chg(\''+esc(e.n)+'\",-1)">−</button><span style="min-width:36px;text-align:center;font-weight:900;font-size:18px;">'+e.q+'</span><button class="qty-btn plus" style="width:34px;height:34px;font-size:16px;" onclick="chg(\''+esc(e.n)+'\',1)">+</button></div></div>';}
    l.innerHTML=h;
}

function toggleCart(){var p=document.getElementById('cartPanel'),o=document.getElementById('cartOverlay');if(p.classList.contains('open')){p.classList.remove('open');o.classList.remove('show');}else{p.classList.add('open');o.classList.add('show');}}
function clearCart(){if(Object.keys(cartData).length===0){showToast('السلة فارغة!');return;}if(confirm('مسح الكل؟')){cartData={};saveAll();renderProducts();showToast('تم المسح');}}

// ============ إضافة ============
function openAddModal(){var sel=document.getElementById('newProdCatSelect');sel.innerHTML='<option value="">-- اختر --</option>';for(var i=0;i<productsData.length;i++){var o=document.createElement('option');o.value=productsData[i].cat;o.textContent=productsData[i].cat;sel.appendChild(o);}document.getElementById('newProdName').value='';document.getElementById('newCatName').value='';sel.value='';document.getElementById('addModalOverlay').classList.add('show');setTimeout(function(){document.getElementById('newProdName').focus();},200);}
function closeAddModal(){document.getElementById('addModalOverlay').classList.remove('show');}

function addNewProduct(){
    var n=document.getElementById('newProdName').value.trim(),cs=document.getElementById('newProdCatSelect').value,nc=document.getElementById('newCatName').value.trim();
    if(!n||n.length<2){showToast('أدخل اسم المنتج',true);return;}
    var t='';if(nc&&nc.length>=2)t=nc;else if(cs)t=cs;else{showToast('اختر قائمة',true);return;}
    for(var i=0;i<customProductsList.length;i++){if(customProductsList[i].name===n&&customProductsList[i].category===t){showToast('موجود!',true);return;}}
    customProductsList.push({name:n,category:t});saveAll();buildFullList();renderProducts();closeAddModal();showToast('✓ تم الإضافة - محفوظ للأبد!');
}

// ============ الفاتورة ============
function buildInvoiceHTML(){
    var ents=[];for(var k in cartData){if(cartData[k]>0)ents.push({n:k,q:cartData[k]});}
    if(!ents.length)return'';
    var now=new Date(),ds=now.toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'}),ts=now.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'}),tq=0;
    for(var i=0;i<ents.length;i++)tq+=ents[i].q;
    var r='';for(var j=0;j<ents.length;j++){r+='<tr><td style="padding:10px 12px;border:1px solid #444;text-align:center;color:#888;width:35px;font-size:13px;">'+(j+1)+'</td><td style="padding:10px 12px;border:1px solid #444;font-weight:bold;font-size:14px;">'+ents[j].n+'</td><td style="padding:10px 12px;border:1px solid #444;text-align:center;font-size:18px;font-weight:900;color:#ffd000;width:55px;">'+ents[j].q+'</td></tr>';}
    var h='';
    h+='<div style="text-align:center;margin-bottom:14px;padding-bottom:12px;border-bottom:2px dashed #ffd000;">';
    h+='<div style="font-size:26px;font-weight:900;color:#ffd000;">سوبر ماركت عساف</div>';
    h+='<div style="font-size:18px;font-weight:800;color:#fff;margin-top:4px;">فاتورة طلبية دخان</div></div>';
    h+='<table style="width:100%;border-collapse:collapse;margin:10px 0;"><thead><tr style="background:#ffd000;"><th style="padding:8px;color:#000;font-weight:900;font-size:12px;border:2px solid #e6b800;text-align:right;">#</th><th style="padding:8px;color:#000;font-weight:900;font-size:12px;border:2px solid #e6b800;text-align:right;">الصنف</th><th style="padding:8px;color:#000;font-weight:900;font-size:12px;border:2px solid #e6b800;text-align:center;">كمية</th></tr></thead><tbody>'+r+'</tbody></table>';
    h+='<div style="background:linear-gradient(135deg,#2a2200,#1a1500);border:2px solid #ffd000;border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center;margin:12px 0;"><span style="font-size:15px;font-weight:700;color:#ccc;">الإجمالي:</span><span style="font-size:24px;font-weight:900;color:#ffd000;">'+tq+' كروز</span></div>';
    h+='<div style="text-align:center;margin-top:12px;padding-top:10px;border-top:1px solid #333;"><p style="color:#777;font-size:11px;">'+ds+' | '+ts+'</p><p style="color:#ffd000;font-size:14px;font-weight:700;margin-top:4px;">شكراً لتعاملكم معنا</p></div>';
    return h;
}

// ============ المشاركة المباشرة ============
async function shareImageDirect(){
    var ents=[];for(var k in cartData){if(cartData[k]>0)ents.push({n:k,q:cartData[k]});}
    if(!ents.length){showToast('السلة فارغة!',true);return;}
    
    var btn=document.getElementById('shareBtn');
    btn.disabled=true;btn.innerHTML='<span class="spinner"></span>...';
    
    try{
        // 1. بناء الفاتورة
        var pv=document.getElementById('invoiceForScreenshot');
        pv.innerHTML=buildInvoiceHTML();
        pv.style.position='fixed';pv.style.top='0';pv.style.left='0';pv.style.zIndex='99998';
        
        await new Promise(r=>setTimeout(r,200));
        
        // 2. التقاط بجودة عالية جداً
        var canvas=await html2canvas(pv,{
            backgroundColor:'#1a1a1a',
            scale:3, // جودة عالية جداً
            useCORS:true,
            logging:false
        });
        
        pv.style.top='-9999px';
        
        // 3. تحويل إلى Blob
        canvas.toBlob(async function(blob){
            if(!blob){showToast('خطأ',true);resetBtn();return;}
            
            var file=new File([blob],'فاتورة-عساف.png',{type:'image/png'});
            
            // 4. محاولة Web Share API (الأفضل للهاتف)
            if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
                try{
                    await navigator.share({
                        title:'فاتورة دخان - سوبر ماركت عساف',
                        text:'فاتورة طلبية دخان',
                        files:[file]
                    });
                    showToast('تم المشاركة ✓','false','success');
                }catch(e){
                    if(e.name!=='AbortError')fallbackShare(file);
                }
            }else{
                fallbackShare(file);
            }
            resetBtn();
        },'image/png');
    }catch(e){
        console.error(e);
        showToast('حدث خطأ',true);
        resetBtn();
    }
}

// بديل إذا فشلت المشاركة المباشرة
function fallbackShare(file){
    // إنشاء URL للصورة
    var url=URL.createObjectURL(file);
    
    // فتح في تبويب جديد - الصورة تملأ الشاشة
    var w=window.open('','_blank');
    if(w){
        // صفحة بسيطة تعرض الصورة بكامل الشاشة
        w.document.write('<!DOCTYPE html><html><head><title>الفاتورة</title>');
        w.document.write('<style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100vw;height:100vh;background:#111;display:flex;justify-content:center;align-items:center}img{max-width:100vw;max-height:100vh;object-fit:contain}</style>');
        w.document.write('</head><body>');
        w.document.write('<img src="'+url+'" alt="الفاتورة" onclick="this.requestFullscreen()"/>');
        w.document.write('<script>document.addEventListener("click",function(){if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{})})<\/script>');
        w.document.write('</body></html>');
        w.document.close();
        
        showToast('تم فتح الصورة - شاركها من المتصفح','false','success');
    }else{
        // تحميل مباشر
        var a=document.createElement('a');
        a.href=url;a.download='فاتورة-عساف.png';
        a.click();
        showToast('⬇️ تم التحميل','false','success');
    }
}

function resetBtn(){var b=document.getElementById('shareBtn');b.disabled=false;b.innerHTML='📤 مشاركة';}

// ============ طباعة ============

    if(!ents.length){alert('السلة فارغة!');return;}
    var now=new Date(),ds=now.toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'}),ts=now.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'}),tq=0;
    for(var i=0;i<ents.length;i++)tq+=ents[i].q;
    var r='';for(var j=0;j<ents.length;j++){r+='<tr><td style="padding:14px;border:1px solid #333;text-align:center;color:#888;">'+(j+1)+'</td><td style="padding:14px;border:1px solid #333;font-weight:bold;">'+ents[j].n+'</td><td style="padding:14px;border:1px solid #333;text-align:center;font-size:22px;font-weight:900;color:#ffd000;">'+ents[j].q+'</td></tr>';}
    var pc='<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><style>*{box-sizing:border-box}body{background:#111;color:#fff;font-family:Cairo,sans-serif;padding:30px}.b{max-width:700px;margin:0 auto;background:#1a1a1a;border-radius:16px;padding:35px}.s{text-align:center;font-size:42px;font-weight:900;color:#ffd000}.t{text-align:center;font-size:28px;font-weight:800;margin:20px 0;padding-bottom:15px;border-bottom:3px solid #ffd000}table{width:100%;border-collapse:collapse;margin:20px 0}th{background:#ffd000;color:#000;padding:14px;font-weight:900}td{padding:14px;border:1px solid #333}.tot{background:#2a2510;border:2px solid #ffd000;border-radius:12px;padding:20px;display:flex;justify-content:space-between}.f{text-align:center;margin-top:25px;padding-top:20px;border-top:1px dashed #444;color:#666}@media print{body{-webkit-print-color-adjust:exact}}</style></head><body><div class="b"><div class="s">سوبر ماركت عساف</div><div class="t">طلبية دخان</div><table><thead><tr><th>#</th><th>الصنف</th><th>الكمية</th></tr></thead><tbody>'+r+'</tbody></table><div class="tot"><span>الإجمالي:</span><span style="font-size:32px;font-weight:900;color:#ffd000">'+tq+' كروز</span></div><div class="f"><p>'+ds+' | '+ts+'</p><p style="color:#ffd000;margin-top:8px;font-weight:700">شكراً لتعاملكم معنا</p></div></div><script>window.onload=function(){window.print()}<\/script></body></html>';
    var w=window.open('','_blank');if(w){w.document.write(pc);w.document.close();}
}

// ============ أدوات ============
function showToast(msg,err,tp){var t=document.getElementById('toastEl');t.textContent=msg;t.className='toast show'+(err?' error':'')+(tp?' '+tp:'');setTimeout(function(){t.className='toast';},3000);}
function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');}

document.addEventListener('keydown',function(e){
    if(e.key==='Escape'){
        if(document.getElementById('addModalOverlay').classList.contains('show'))closeAddModal();
        else{var p=document.getElementById('cartPanel');if(p.classList.contains('open'))toggleCart();}
    }
});

initApp();

</script>
