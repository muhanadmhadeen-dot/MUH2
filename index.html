<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلبات الدخان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #0a0a08; color: #f5f5f0; min-height: 100vh; }
        h1, h2, h3 { font-family: 'Cairo', sans-serif; }
        
        .header {
            position: sticky; top: 0;
            background: rgba(10,10,8,0.97);
            border-bottom: 1px solid #33332a;
            padding: 16px 20px;
            z-index: 100;
        }
        
        .logo {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #ffd000, #e6b800);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        
        .btn {
            padding: 12px 22px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-gold { background: #ffd000; color: #000; }
        .btn-gold:hover { box-shadow: 0 4px 15px rgba(255,208,0,0.4); transform: translateY(-2px); }
        .btn-gold:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-outline { background: transparent; color: #ffd000; border: 2px solid #ffd000; }
        .btn-outline:hover { background: #ffd000; color: #000; }
        
        .btn-red { background: transparent; color: #ff6b6b; border: 2px solid #ff6b6b; }
        .btn-red:hover { background: #ff6b6b; color: white; }

        .btn-blue { background: #0088cc; color: white; border: 2px solid #0088cc; }
        .btn-blue:hover { background: #0077b5; }

        .btn-green { background: #25D366; color: white; border: 2px solid #25D366; }
        .btn-green:hover { background: #128C7E; }
        
        .search-wrap { position: relative; max-width: 1100px; margin: 30px auto 20px; padding: 0 20px; }
        .search-input {
            width: 100%;
            background: #1c1c16;
            border: 2px solid #33332a;
            border-radius: 12px;
            padding: 16px 20px 16px 50px;
            color: #f5f5f0;
            font-size: 16px;
        }
        .search-input:focus { outline: none; border-color: #ffd000; }
        .search-icon { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: #9a9a85; }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px 100px; }
        
        .category-title {
            background: linear-gradient(90deg, rgba(255,208,0,0.15) 0%, transparent 100%);
            border-right: 4px solid #ffd000;
            padding: 12px 18px;
            margin-bottom: 14px;
            border-radius: 0 8px 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 12px;
            margin-bottom: 35px;
        }
        
        .product-card {
            background: #141410;
            border: 1px solid #33332a;
            border-radius: 10px;
            padding: 14px 18px;
            padding-left: 38px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            position: relative;
        }
        .product-card:hover { border-color: #ffd000; transform: translateY(-2px); }
        .product-card.active { border-color: #ffd000; box-shadow: 0 0 0 2px rgba(255,208,0,0.3); }
        .product-card.is-custom { border-right: 3px solid #9333ea; }
        
        /* Delete button on product */
        .delete-product-btn {
            position: absolute;
            top: 6px; left: 6px;
            width: 26px; height: 26px;
            background: rgba(255,107,107,0.15);
            border: 1px solid rgba(255,107,107,0.3);
            border-radius: 6px;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .delete-product-btn:hover { 
            background: #ff6b6b; 
            color: white; 
            transform: scale(1.1); 
        }
        
        .qty-btn {
            width: 36px; height: 36px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        .qty-btn.plus { background: #ffd000; color: #000; }
        .qty-btn.minus { background: #ff6b6b; color: white; }
        .qty-btn:hover { transform: scale(1.1); }
        
        .qty-num { min-width: 40px; text-align: center; font-size: 20px; font-weight: 900; color: #ffd000; }
        
        /* Cart */
        .cart-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 400;
            display: none;
        }
        .cart-overlay.show { display: block; }
        
        .cart-panel {
            position: fixed;
            top: 0; left: -450px;
            width: 420px; max-width: 95vw;
            height: 100vh;
            background: #141410;
            border-left: 1px solid #33332a;
            z-index: 500;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .cart-panel.open { left: 0; }
        
        .cart-item {
            background: #1c1c16;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .total-box {
            background: rgba(255,208,0,0.1);
            border: 2px solid #ffd000;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 16px;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 700;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .modal-overlay.show { display: flex; }
        
        .modal-box {
            background: #111;
            border: 2px solid #ffd000;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 95vh;
            overflow-y: auto;
        }
        
        .form-input {
            width: 100%;
            background: #1c1c16;
            border: 2px solid #33332a;
            border-radius: 10px;
            padding: 14px 16px;
            color: #f5f5f0;
            font-size: 15px;
        }
        .form-input:focus { outline: none; border-color: #ffd000; }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 25px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: #ffd000;
            color: #000;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.error { background: #ff6b6b; color: white; }
        .toast.success { background: #25D366; color: white; }
        
        .badge {
            position: absolute;
            top: -5px; left: -5px;
            background: #ffd000;
            color: #000;
            width: 22px; height: 22px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #9a9a85; }

        /* Hidden invoice for screenshot */
        #invoiceForScreenshot {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 480px;
            background: linear-gradient(145deg, #1a1a1a, #0d0d0a);
            border-radius: 16px;
            padding: 28px;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 640px) {
            .product-card { flex-direction: column; gap: 12px; text-align: center; }
            .products-grid { grid-template-columns: 1fr; }
            #invoiceForScreenshot { width: 320px; padding: 20px; }
            .modal-box { max-width: 100%; border-radius: 15px 15px 0 0; position: fixed; bottom: 0; max-height: 85vh; }
            .modal-overlay { align-items: flex-end; padding: 0; }
            .cart-panel { left: -100%; width: 100%; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div style="max-width:1100px;margin:auto;display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:14px;">
            <div class="logo">
                <svg width="24" height="24" fill="none" stroke="#000" stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5"/>
                </svg>
            </div>
            <div>
                <h1 style="font-size:22px;font-weight:900;">طلبات الدخان</h1>
                <p style="font-size:13px;color:#9a9a85;">سوبر ماركت عساف</p>
            </div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
            <button class="btn btn-outline" onclick="openAddModal()">+ إضافة</button>
            <button onclick="toggleCart()" style="position:relative;background:none;border:none;cursor:pointer;padding:10px;border-radius:10px;" onmouseover="this.style.background='#1c1c16'" onmouseout="this.style.background='none'">
                <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                <span id="cartBadge" class="badge" style="display:none;">0</span>
            </button>
        </div>
    </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
    <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن نوع الدخان..." oninput="renderProducts()">
</div>

<!-- PRODUCTS -->
<div id="productsContainer" class="container"></div>

<!-- CART OVERLAY -->
<div id="cartOverlay" class="cart-overlay" onclick="toggleCart()"></div>

<!-- CART PANEL -->
<aside id="cartPanel" class="cart-panel">
    <div style="padding:20px;border-bottom:1px solid #33332a;display:flex;justify-content:space-between;align-items:center;">
        <h2 style="font-size:20px;font-weight:900;">🛒 السلة</h2>
        <button onclick="toggleCart()" style="background:none;border:none;color:#9a9a85;cursor:pointer;font-size:22px;">✕</button>
    </div>
    <div id="cartItemsList" style="flex:1;overflow-y:auto;padding:16px;"></div>
    <div style="padding:20px;border-top:1px solid #33332a;">
        <div class="total-box">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;">
                <span style="color:#9a9a85;">الأصناف:</span>
                <span id="totalTypes">0</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-weight:bold;">الإجمالي:</span>
                <span id="totalQty" style="font-size:28px;font-weight:900;color:#ffd000;">0</span>
            </div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button onclick="clearCart()" class="btn btn-red" style="flex:1;min-width:80px;">مسح</button>
            <button onclick="shareOrDownloadImage()" class="btn btn-gold" style="flex:1.5;min-width:130px;" id="shareBtn">📸 مشاركة</button>
            <button onclick="printOrder()" class="btn btn-blue" style="flex:1;min-width:90px;">🖨️ طباعة</button>
        </div>
    </div>
</aside>

<!-- ADD MODAL -->
<div id="addModalOverlay" class="modal-overlay">
    <div class="modal-box" style="max-width:440px;background:#141410;">
        <div style="padding:20px;border-bottom:1px solid #33332a;display:flex;justify-content:space-between;align-items:center;">
            <h3 style="font-weight:900;">إضافة منتج جديد</h3>
            <button onclick="closeAddModal()" style="background:none;border:none;color:#9a9a85;cursor:pointer;font-size:22px;">✕</button>
        </div>
        <div style="padding:20px;">
            <label style="display:block;margin-bottom:6px;font-weight:700;font-size:14px;color:#9a9a85;">اسم المنتج *</label>
            <input type="text" id="newProdName" class="form-input" placeholder="مثال: كينت جولد">
            <label style="display:block;margin:16px 0 6px;font-weight:700;font-size:14px;color:#9a9a85;">اختر قائمة</label>
            <select id="newProdCatSelect" class="form-input" style="background:#1c1c16;"></select>
            <label style="display:block;margin:16px 0 6px;font-weight:700;font-size:14px;color:#ffd000;">أو قائمة جديدة</label>
            <input type="text" id="newCatName" class="form-input" placeholder="اسم القائمة الجديدة">
            <div style="margin-top:22px;display:flex;gap:10px;">
                <button onclick="addNewProduct()" class="btn btn-gold" style="flex:1;">✓ إضافة</button>
                <button onclick="closeAddModal()" class="btn btn-red" style="flex:0.6;">إلغاء</button>
            </div>
        </div>
    </div>
</div>

<!-- HIDDEN INVOICE FOR SCREENSHOT -->
<div id="invoiceForScreenshot"></div>

<!-- TOAST -->
<div id="toastEl" class="toast"></div>

<script>
// ============ البيانات الأساسية ============
var DEFAULT_PRODUCTS = [
    {cat:"كينت",items:["كينت ازرق","كينت سلفر","كينت ادفانس ازرق","كينت ادفانس سلفر","كينت ميكس"]},
    {cat:"مارلبورو",items:["مارلبورو احمر","مارلبورو ابيض","مارلبورو سلفر","مارلبورو تتشر","مارلبورو ميكس"]},
    {cat:"ونستون",items:["ونستون ابيض قصير","ونستون ابيض طويل","ونستون احمر","ونستون سلفر","ونستون اكس ياند","ونستون كومباكت سلفر","ونستون ون","ابو مهند","ابو يزن"]},
    {cat:"ميكادو",items:["ميكادو ابيض","ميكادو احمر"]},
    {cat:"اخرى",items:["GAmEL"]},
    {cat:"ال ام",items:["ال ام ابيض قصير","ال ام احمر قصير","ال ام سلفر قصير","ال ام لفت ازرق","ال ام لفت احمر"]},
    {cat:"ال دي",items:["ال دي ابيض","ال دي احمر","ال دي سلفر"]},
    {cat:"جولد كوست",items:["جولد كوست ابيض قصير","جولد كوست احمر قصير","جولد كوست ابيض طويل","جولد كوست احمر طويل"]},
    {cat:"اندرسون",items:["اندرسون احمر طويل","اندرسون سلفر طويل","اندرسون سلفر قصير","اندرسون ابيض طويل","اندرسون احمر قصير","اندرسون ابيض قصير"]},
    {cat:"بارلمنت",items:["بارلمنت نايت ازرق","بارلمنت اكو ازرق"]},
    {cat:"إلجنس",items:["إلجنس ازرق","إلجنس اخضر","إلجنس سلفر"]},
    {cat:"دفدوف",items:["دفدوف احمر","دفدوف ازرق"]},
    {cat:"يلاتينوم",items:["يلاتينوم توت","يلاتينوم مانجا","يلاتينوم برتقال"]}
];

// المتغيرات
var productsData = [];
var cartData = {};
var customProductsList = []; // قائمة المنتجات المضافة (تبقى للأبد)
var lastImageUrl = null;

// مفاتيح التخزين
var KEY_CUSTOM = 'asaf_custom_products_final';
var KEY_CART = 'asaf_cart_final';

// ============ أدوات التخزين ============
function saveData(key, data) {
    try {
        localStorage.setItem(key, JSON.stringify(data));
        return true;
    } catch(e) {
        console.error('Save error:', e);
        return false;
    }
}

function loadData(key, defaultVal) {
    try {
        var s = localStorage.getItem(key);
        return s ? JSON.parse(s) : defaultVal;
    } catch(e) {
        return defaultVal;
    }
}

function saveAll() {
    saveData(KEY_CUSTOM, customProductsList);
    saveData(KEY_CART, cartData);
}

// ============ بدء التطبيق ============
function initApp() {
    // 1. تحميل المنتجات المضافة (تبقى للأبد)
    customProductsList = loadData(KEY_CUSTOM, []);
    console.log('المنتجات المحفوظة:', customProductsList.length);
    
    // 2. بناء القائمة الكاملة
    buildFullProductList();
    
    // 3. تحميل السلة
    cartData = loadData(KEY_CART, {});
    
    // 4. العرض
    renderProducts();
}

// ============ بناء القائمة الكاملة ============
function buildFullProductList() {
    // نسخ الافتراضي
    productsData = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
    
    // إضافة المخصصة
    for (var i = 0; i < customProductsList.length; i++) {
        var item = customProductsList[i];
        var catName = item.category;
        var prodName = item.name;
        
        // البحث عن القائمة
        var foundCat = null;
        for (var j = 0; j < productsData.length; j++) {
            if (productsData[j].cat === catName) {
                foundCat = productsData[j];
                break;
            }
        }
        
        // إنشاء إذا غير موجودة
        if (!foundCat) {
            foundCat = { cat: catName, items: [] };
            productsData.push(foundCat);
        }
        
        // إضافة المنتج إذا غير موجود
        if (foundCat.items.indexOf(prodName) === -1) {
            foundCat.items.push(prodName);
        }
    }
}

// ============ عرض المنتجات ============
function renderProducts() {
    var container = document.getElementById('productsContainer');
    var search = document.getElementById('searchInput').value.trim().toLowerCase();
    var html = '';
    var hasAny = false;
    
    for (var ci = 0; ci < productsData.length; ci++) {
        var cat = productsData[ci];
        var filtered = [];
        
        for (var ii = 0; ii < cat.items.length; ii++) {
            var it = cat.items[ii];
            if (search === '' || it.toLowerCase().indexOf(search) !== -1 || cat.cat.toLowerCase().indexOf(search) !== -1) {
                filtered.push(it);
            }
        }
        
        if (filtered.length === 0) continue;
        hasAny = true;
        
        html += '<div>';
        html += '<div class="category-title">';
        html += '<h3 style="font-size:18px;font-weight:900;">' + cat.cat + '</h3>';
        html += '<span style="font-size:12px;color:#9a9a85;">' + filtered.length + ' أصناف</span>';
        html += '</div><div class="products-grid">';
        
        for (var fi = 0; fi < filtered.length; fi++) {
            var pname = filtered[fi];
            var qty = cartData[pname] || 0;
            var activeCls = qty > 0 ? 'active' : '';
            
            // هل هو منتج مضاف؟
            var isCustom = isCustomProduct(pname);
            var customCls = isCustom ? 'is-custom' : '';
            var delBtn = isCustom ? '<button class="delete-product-btn" onclick="event.stopPropagation();confirmDelete(\'' + esc(pname) + '\')" title="حذف">✕</button>' : '';
            var nameStyle = isCustom ? 'color:#c084fc;' : '';
            var badge = isCustom ? ' 🆕' : '';
            
            html += '<div class="product-card ' + activeCls + ' ' + customCls + '">';
            html += delBtn;
            html += '<span style="font-weight:700;font-size:15px;' + nameStyle + '">' + pname + badge + '</span>';
            html += '<div style="display:flex;align-items:center;gap:8px;">';
            html += '<button class="qty-btn minus" onclick="changeQty(\'' + esc(pname) + '\',-1)">−</button>';
            html += '<span class="qty-num">' + qty + '</span>';
            html += '<button class="qty-btn plus" onclick="changeQty(\'' + esc(pname) + '\',1)">+</button>';
            html += '</div></div>';
        }
        html += '</div></div>';
    }
    
    if (!hasAny) {
        html = '<div class="empty-state"><p style="font-size:20px;">لا توجد نتائج</p></div>';
    }
    
    container.innerHTML = html;
    updateCartUI();
}

function isCustomProduct(name) {
    for (var i = 0; i < customProductsList.length; i++) {
        if (customProductsList[i].name === name) return true;
    }
    return false;
}

// ============ حذف منتج ============
function confirmDelete(name) {
    if (confirm('حذف "' + name + '"؟\n\nلن يظهر بعد ذلك إلا إذا أضفته مجدداً.')) {
        // إزالة من القائمة
        for (var i = 0; i < customProductsList.length; i++) {
            if (customProductsList[i].name === name) {
                customProductsList.splice(i, 1);
                break;
            }
        }
        // إزالة من السلة
        delete cartData[name];
        // حفظ
        saveAll();
        // إعادة البناء والعرض
        buildFullProductList();
        renderProducts();
        showToast('تم حذف "' + name + '"');
    }
}

// ============ الكمية ============
function changeQty(name, delta) {
    var q = (cartData[name] || 0) + delta;
    if (q <= 0) delete cartData[name];
    else cartData[name] = q;
    saveAll();
    renderProducts();
    if (delta > 0) showToast('تم إضافة ' + name);
}

// ============ السلة ============
function updateCartUI() {
    var badge = document.getElementById('cartBadge');
    var tT = document.getElementById('totalTypes');
    var tQ = document.getElementById('totalQty');
    var list = document.getElementById('cartItemsList');
    
    var entries = [];
    for (var k in cartData) { if (cartData[k] > 0) entries.push({n:k,q:cartData[k]}); }
    
    var totalQ = 0;
    for (var i = 0; i < entries.length; i++) totalQ += entries[i].q;
    
    badge.style.display = entries.length > 0 ? 'flex' : 'none';
    badge.textContent = totalQ;
    tT.textContent = entries.length + ' صنف';
    tQ.textContent = totalQ;
    
    if (entries.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>السلة فارغة</p></div>';
        return;
    }
    
    var h = '';
    for (var j = 0; j < entries.length; j++) {
        var e = entries[j];
        h += '<div class="cart-item">';
        h += '<div><p style="margin:0;font-weight:700;">' + e.n + '</p><p style="margin:4px 0 0;font-size:13px;color:#9a9a85;">' + e.q + ' كروز</p></div>';
        h += '<div style="display:flex;gap:6px;align-items:center;">';
        h += '<button class="qty-btn minus" style="width:34px;height:34px;font-size:16px;" onclick="changeQty(\'' + esc(e.n) + '\',-1)">−</button>';
        h += '<span style="min-width:36px;text-align:center;font-weight:900;font-size:18px;">' + e.q + '</span>';
        h += '<button class="qty-btn plus" style="width:34px;height:34px;font-size:16px;" onclick="changeQty(\'' + esc(e.n) + '\',1)">+</button>';
        h += '</div></div>';
    }
    list.innerHTML = h;
}

function toggleCart() {
    var p = document.getElementById('cartPanel'), o = document.getElementById('cartOverlay');
    if (p.classList.contains('open')) { p.classList.remove('open'); o.classList.remove('show'); }
    else { p.classList.add('open'); o.classList.add('show'); }
}

function clearCart() {
    if (Object.keys(cartData).length === 0) { showToast('السلة فارغة!'); return; }
    if (confirm('مسح جميع العناصر؟')) { cartData = {}; saveAll(); renderProducts(); showToast('تم المسح'); }
}

// ============ إضافة منتج ============
function openAddModal() {
    var sel = document.getElementById('newProdCatSelect');
    sel.innerHTML = '<option value="">-- اختر --</option>';
    for (var i = 0; i < productsData.length; i++) {
        var o = document.createElement('option');
        o.value = productsData[i].cat; o.textContent = productsData[i].cat;
        sel.appendChild(o);
    }
    document.getElementById('newProdName').value = '';
    document.getElementById('newCatName').value = '';
    sel.value = '';
    document.getElementById('addModalOverlay').classList.add('show');
    setTimeout(function(){document.getElementById('newProdName').focus();},200);
}
function closeAddModal() { document.getElementById('addModalOverlay').classList.remove('show'); }

function addNewProduct() {
    var name = document.getElementById('newProdName').value.trim();
    var catSel = document.getElementById('newProdCatSelect').value;
    var newCat = document.getElementById('newCatName').value.trim();
    
    if (!name || name.length < 2) { showToast('أدخل اسم المنتج', true); return; }
    
    var target = '';
    if (newCat && newCat.length >= 2) target = newCat;
    else if (catSel) target = catSel;
    else { showToast('اختر قائمة أو أدخل جديدة', true); return; }
    
    // التحقق من عدم التكرار
    for (var i = 0; i < customProductsList.length; i++) {
        if (customProductsList[i].name === name && customProductsList[i].category === target) {
            showToast('موجود مسبقاً!', true);
            return;
        }
    }
    
    // الإضافة
    customProductsList.push({ name: name, category: target });
    saveAll();
    buildFullProductList();
    renderProducts();
    closeAddModal();
    showToast('✓ تمت الإضافة - "' + name + '" محفوظ للأبد!');
}

// ============ الفاتورة ============
function buildInvoiceHTML() {
    var entries = [];
    for (var k in cartData) { if (cartData[k] > 0) entries.push({n:k,q:cartData[k]}); }
    if (entries.length === 0) return '';
    
    var now = new Date();
    var dateStr = now.toLocaleDateString('ar-SA', {year:'numeric', month:'long', day:'numeric'});
    var timeStr = now.toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
    var totalQ = 0;
    for (var i = 0; i < entries.length; i++) totalQ += entries[i].q;
    
    var rows = '';
    for (var j = 0; j < entries.length; j++) {
        rows += '<tr><td style="padding:10px 14px;border:1px solid #444;text-align:center;color:#888;width:40px;font-size:14px;">' + (j+1) + '</td>';
        rows += '<td style="padding:10px 14px;border:1px solid #444;font-weight:bold;font-size:15px;">' + entries[j].n + '</td>';
        rows += '<td style="padding:10px 14px;border:1px solid #444;text-align:center;font-size:18px;font-weight:900;color:#ffd000;width:65px;">' + entries[j].q + '</td></tr>';
    }
    
    var h = '';
    h += '<div style="text-align:center;margin-bottom:16px;padding-bottom:14px;border-bottom:2px dashed #ffd000;">';
    h += '<div style="font-size:28px;font-weight:900;color:#ffd000;">سوبر ماركت عساف</div>';
    h += '<div style="font-size:20px;font-weight:800;color:#fff;margin-top:6px;">فاتورة طلبية دخان</div>';
    h += '</div>';
    h += '<table style="width:100%;border-collapse:collapse;margin:12px 0;">';
    h += '<thead><tr style="background:#ffd000;"><th style="padding:10px;color:#000;font-weight:900;font-size:13px;border:2px solid #e6b800;text-align:right;">#</th><th style="padding:10px;color:#000;font-weight:900;font-size:13px;border:2px solid #e6b800;text-align:right;">الصنف</th><th style="padding:10px;color:#000;font-weight:900;font-size:13px;border:2px solid #e6b800;text-align:center;">كمية</th></tr></thead>';
    h += '<tbody>' + rows + '</tbody></table>';
    h += '<div style="background:linear-gradient(135deg,#2a2200,#1a1500);border:2px solid #ffd000;border-radius:10px;padding:14px;display:flex;justify-content:space-between;align-items:center;margin:14px 0;">';
    h += '<span style="font-size:16px;font-weight:700;color:#ccc;">الإجمالي:</span>';
    h += '<span style="font-size:26px;font-weight:900;color:#ffd000;">' + totalQ + ' كروز</span>';
    h += '</div>';
    h += '<div style="text-align:center;margin-top:14px;padding-top:12px;border-top:1px solid #333;">';
    h += '<p style="color:#777;font-size:12px;">' + dateStr + ' | ' + timeStr + '</p>';
    h += '<p style="color:#ffd000;font-size:15px;font-weight:700;margin-top:6px;">شكراً لتعاملكم معنا</p>';
    h += '</div>';
    
    return h;
}

// ============ مشاركة/تحميل الصورة ============
async function shareOrDownloadImage() {
    var entries = [];
    for (var k in cartData) { if (cartData[k] > 0) entries.push({n:k,q:cartData[k]}); }
    if (entries.length === 0) { showToast('السلة فارغة!', true); return; }
    
    var btn = document.getElementById('shareBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> جاري...';
    
    try {
        // 1. بناء الفاتورة
        var preview = document.getElementById('invoiceForScreenshot');
        preview.innerHTML = buildInvoiceHTML();
        preview.style.position = 'fixed';
        preview.style.top = '0'; preview.style.left = '0';
        preview.style.zIndex = '99998';
        
        await new Promise(r => setTimeout(r, 200));
        
        // 2. التقاط الصورة
        var canvas = await html2canvas(preview, {
            backgroundColor: '#1a1a1a',
            scale: 2,
            useCORS: true,
            logging: false
        });
        
        preview.style.top = '-9999px'; preview.style.left = '-9999px';
        
        // 3. تحويل إلى Blob
        canvas.toBlob(async function(blob) {
            if (!blob) {
                showToast('فشل إنشاء الصورة', true);
                resetShareBtn();
                return;
            }
            
            var file = new File([blob], 'فاتورة-عساف.png', {type: 'image/png'});
            
            // 4. محاولة المشاركة المباشرة (Web Share API)
            if (navigator.share && navigator.canShare && navigator.canShare({files: [file]})) {
                try {
                    await navigator.share({
                        title: 'فاتورة طلبية دخان - سوبر ماركت عساف',
                        files: [file]
                    });
                    showToast('تم المشاركة ✓');
                } catch(err) {
                    if (err.name !== 'AbortError') {
                        // إذا ألغى المستخدم أو فشل → حمل مباشرة
                        downloadBlob(blob);
                    }
                }
            } else {
                // المتصفح لا يدعم المشاركة → حمل مباشرة
                downloadBlob(blob);
            }
            
            resetShareBtn();
        }, 'image/png');
        
    } catch(err) {
        console.error(err);
        showToast('حدث خطأ', true);
        resetShareBtn();
    }
}

function downloadBlob(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'فاتورة-عساف-' + Date.now() + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('⬇️ جاري تحميل الصورة...');
}

function resetShareBtn() {
    var btn = document.getElementById('shareBtn');
    btn.disabled = false;
    btn.innerHTML = '📸 مشاركة';
}

// ============ أدوات ============
function showToast(msg, err, type) {
    var t = document.getElementById('toastEl');
    t.textContent = msg;
    t.className = 'toast show' + (err ? ' error' : '') + (type ? ' ' + type : '');
    setTimeout(function(){t.className='toast';},3000);
}

function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');}

// Keyboard
document.addEventListener('keydown', function(e){
    if(e.key==='Escape'){
        if(document.getElementById('addModalOverlay').classList.contains('show'))closeAddModal();
        else{var p=document.getElementById('cartPanel');if(p.classList.contains('open'))toggleCart();}
    }
});

// Start
initApp();
